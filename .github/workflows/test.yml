name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Install the package with all framework deps.
          # Note: keep this list in sync with README.
          pip install -e .
          pip install \
            mcp \
            langchain-mcp-adapters \
            llama-index-tools-mcp \
            crewai-tools \
            mcpadapt \
            'pydantic[email]' \
            pydantic-ai-slim \
            ag2 \
            pytest \
            pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v
